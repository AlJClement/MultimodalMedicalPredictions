INPUT_PATHS:
  DATASET_NAME: oai
  PARTITION: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/oai/partition_0.95_0.05_duplicatesforbatchsize8.json
  IMAGES: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/oai/imgs #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/imgs
  LABELS: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/oai/txt
  META_PATH: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/oai/MeasInventory.csv #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/multimodal.csv
 
  ID_COL: id
  META_COLS: [P02SEX: hot] #, age(weeks): continous, Breech: hot] # FamilyHistory: hot, ClickyHip: hot, FirstBorn: hot,

MODEL: 
  OUT_CHANNELS: 14
  DEVICE: cuda
  #
  META_FEATURES: [100,100,100] 
  NAME: 'dpt'
  ENCODER_NAME: tu-swinv2_base_window12to24_192to384.ms_in22k_ft_in1k  ##'resnet34' ''"tu-swinv2_cr_small_224"
  ENCODER_WEIGHTS: 'imagenet'
  BATCH_NORM_DECODER: True
  DECODER_CHANNELS:
    - 256
    - 256
    - 256
    - 128
    - 64
  IN_CHANNELS: 3
  ATTENTION: scse

  FREEZE_LAYERS: 0


DATASET:
  IMAGE_EXT: ".jpg"
  ANNOTATION_TYPE: "LANDMARKS" #SEGMENTATIONS
  NUM_LANDMARKS: 14
  COMBINE_REVIEWERS: False 
  SIGMA: 1 #if sigma is NONE no guassian applied
  FLIP_AXIS: False
  CACHED_IMAGE_SIZE: [384,384]
  PIXEL_SIZE: [0.34,0.34]


  AUGMENTATION:
  #all of the defined parameters allow for a range of the factors below
    ROTATION_FACTOR: 1 #affineddh
    INTENSITY_FACTOR: 1.0 #multiplicaiton factor
    SF: 0.1 #affine scale factor
  
    TRANSLATION_X: 0.1 #affine
    TRANSLATION_Y: 0.1 #affine
    SPECKLE_NOISE: 0
    COARSE_SALTANDPEPPER: 0.2 #percent of all pixels that will be dropped
    SOME_OF: 2 #if this is definied as not None, it will choose some of the augmentation instead of doing all sequentially for each image
    ##flip is also now on



OUTPUT_PATH: ./output_OAI_0420_swin
TRAIN:
  BATCH_SIZE: 8
  LR: 0.0001
  EPOCHS: 10
  LOSS: nll_across_batch #_cosinelandmarkvector #_walphafhc #_mse_walpha
  L2_REG: False
  GAMMA: 0.0
  USE_AMP: False
  COMBINE_GRAF_FHC: True #this will just combine the results of the output 
  # GRAD_ACCUMULATION_STEPS: 1
  # GRAD_ACCUMULATION_STEPS_REDUCE: 50 ## unused when accumulation is disabled
  # GRAD_ACCUMULATION_STEPS_MIN: 1 ## 
TEST:
  NETWORK: /model:1/_model_run:1_idx.pth
  COMPARISON_METRICS: 
    # - landmark_metrics().get_eres
    # - landmark_metrics().get_radial_errors
    - protractor_hka().hka_angles
  SDR_THRESHOLD: [10, 20, 40, 80]
  SDR_UNITS: pixels
  TEST_TIME_AUG: True
  TEST_TIME_AUG_NUM: 10
  WANDB_NUM_FAILURE_EXAMPLES: 10
  NUM_WORKERS: 8
  PIN_MEMORY: True
  PERSISTENT_WORKERS: True
  PREFETCH_FACTOR: 2
  EVAL_DATASETS:
    - NAME: oai_all
      DATASET_NAME: oai_nolandmarks
      META_PATH:  /data/coml-oxmedis/datasets-in-use/multimodal_datasets/oai/MeasInventory.csv 
      DCMS: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/oai/dcms
      PARTITION: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/oai/partition_0.95_0.05_duplicatesforbatchsize8.json
      IMAGES: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/oai/imgs #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/imgs
      LABELS_NUMBERS: [/data/coml-oxmedis/datasets-in-use/multimodal_datasets/oai/FLXR_KneeAlign_Duryea01.txt, /data/coml-oxmedis/datasets-in-use/multimodal_datasets/oai/flxr_kneealign_cooke01.txt]
      META_PATH: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/oai/MeasInventory.csv #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/multimodal.csv
    
  
  SAVE_HEATMAPS_LANDMARKS_IMG: True
  SAVE_IMG_LANG_PREDANDTRUE: True
  SAVE_HEATMAPS_NP: True
  
