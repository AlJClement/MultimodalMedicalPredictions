INPUT_PATHS:
  DATASET_NAME: ddh
  PARTITION: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_all/partition_0.7_0.15_0.15_0.01499_best.json #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/partition_0.7_0.15_0.15_0.04153.json
  IMAGES: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_all/imgs #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/imgs
  DCMS:  /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_all/dcms #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/imgs
  LABELS: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_all/txt #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/txt
  META_PATH: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_all/meta_allusable.csv 

  # PARTITION: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_retuve/partition_0_0_1.json  #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/partition_0.7_0.15_0.15_0.04153.json
  # IMAGES: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_retuve/imgs 
  # META_PATH:  /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_retuve/retuve_metadata.csv
  
  # PARTITION: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_RNOH/partition_stanmore_test.json
  # IMAGES: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_RNOH/imgs
  # LABELS: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_RNOH/txt
  # META_PATH: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_RNOH/CS_RNOH.csv
  # PARTITION: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_MKUH/partition_0_0_1_1.00000.json #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/partition_0.7_0.15_0.15_0.04153.json
  # IMAGES: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_MKUH/imgs #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/imgs
  # LABELS: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_MKUH/txt #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/txt
  # META_PATH: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_MKUH/CS_MKUHv3.csv #/data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh/multimodal.csv  # IMAGES: /experiments/datasets-in-use/multimodal_datasets/ddh_RNOH/imgs
  # LABELS: /experiments/datasets-in-use/multimodal_datasets/ddh_RNOH/txt
  # META_PATH: /experiments/datasets-in-use/multimodal_datasets/ddh_RNOH/CS_RNOH.csv

  ID_COL: Accession Number
  META_COLS: [Sex: hot] #, age(weeks): continous, Breech: hot] # FamilyHistory: hot, ClickyHip: hot, FirstBorn: hot,
  # META_COLS_CLASSES: ['Type', 'alpha (degrees)', 'FHC (%)'] ## must have these to be considered in calculations

MODEL: 
  #NAME: unet_meta_lastlayer
  #IN_CHANNELS: 1
  OUT_CHANNELS: 7 #for 5 landmarks
  #INIT_FEATURES: 4
  #META_FEATURES: [100, 100, 100] 
  # #how large to make the linear layer, if its ZERO no features added
  DEVICE: cuda

  #
  META_FEATURES: [100,100,100] 
  NAME: 'dpt'
  ENCODER_NAME: 'tu-swinv2_base_window12to24_192to384.ms_in22k_ft_in1k' ##'resnet34'
  ENCODER_WEIGHTS: 'imagenet'
  BATCH_NORM_DECODER: True
  DECODER_CHANNELS:
    - 256
    - 256
    - 256
    - 128
    - 64
  IN_CHANNELS: 3
  ATTENTION: scse
  CHANNEL_TYPE: multimodal

  FREEZE_LAYERS: 0

DATASET:
  IMAGE_EXT: ".jpg"
  ANNOTATION_TYPE: "LANDMARKS" #SEGMENTATIONS
  NUM_LANDMARKS: 7 
  COMBINE_REVIEWERS: False 
  SIGMA: 1 #if sigma is NONE no guassian applied
  FLIP_AXIS: True
  CACHED_IMAGE_SIZE: [384,384]
  PIXEL_SIZE: [0.0700711,0.0700711]
  #PIXEL_SIZE: [1.0,1.0]

  AUGMENTATION:
  #all of the defined parameters allow for a range of the factors below
    ROTATION_FACTOR: 1 #affine
    INTENSITY_FACTOR: 1.0 #multiplicaiton factor
    SF: 0.8 #affine scale factor
    TRANSLATION_X: 0.2 #affine
    TRANSLATION_Y: 0.2 #affine
    SPECKLE_NOISE: 2
    COARSE_SALTANDPEPPER: 0.20 #percent of all pixels that will be dropped

    SOME_OF: 3 #if this is definied as not None, it will choose some of the augmentation instead of doing all sequentially for each image

OUTPUT_PATH: ./output_ddh_0427_dptmmgate_0.1466
TRAIN:
  BATCH_SIZE: 8
  LR: 0.0001
  EPOCHS: 5
  LOSS: nll_across_batch #_cosinelandmarkvector #_walphafhc #_mse_walpha
  L2_REG: False
  GAMMA: 0.0
  USE_AMP: False
  COMBINE_GRAF_FHC: True #this will just combine the results of the output 
  # GRAD_ACCUMULATION_STEPS: 1
  # GRAD_ACCUMULATION_STEPS_REDUCE: 50 ## unused when accumulation is disabled
  # GRAD_ACCUMULATION_STEPS_MIN: 1 ## 
  PLOT_MULTIMODAL_CHANNELS: True

TEST:
  NETWORK: /model:1/_model_run:1_idx.pth
  COMPARISON_METRICS: 
    - graf_angle_calc().graf_class_comparison
    - landmark_metrics().get_eres
    - landmark_metrics().get_radial_errors
    - fhc().get_fhc
  SDR_THRESHOLD: [7.1, 14.2, 28.45, 56.9]
  SDR_UNITS: pixels
  NUM_WORKERS: 8
  PIN_MEMORY: True
  PERSISTENT_WORKERS: True
  PREFETCH_FACTOR: 2
  TEST_TIME_AUG: True
  TEST_TIME_AUG_NUM: 10
  EVAL_DATASETS:
    - NAME: ddh_all
      DATASET_NAME: ddh
      PARTITION: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_all/partition_0.7_0.15_0.15_0.01499_best.json
      IMAGES: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_all/imgs
      LABELS: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_all/txt
      META_PATH: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_all/meta_allusable.csv
      DCMS: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_all/dcms
    - NAME: ddh_rnoh
      DATASET_NAME: ddh
      PARTITION: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_RNOH/partition_stanmore_test.json
      IMAGES: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_RNOH/imgs
      LABELS: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_RNOH/txt
      META_PATH: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_RNOH/CS_RNOH.csv
    - NAME: ddh_mkuh
      DATASET_NAME: ddh
      PARTITION: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_MKUH/partition_0_0_1_1.00000.json
      IMAGES: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_MKUH/imgs
      LABELS: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_MKUH/txt
      META_PATH: /data/coml-oxmedis/datasets-in-use/multimodal_datasets/ddh_MKUH/CS_MKUHv3.csv
  
  
  PLOT: False
  SAVE_HEATMAPS_LANDMARKS_IMG: False
  SAVE_IMG_LANG_PREDANDTRUE: True
  SAVE_HEATMAPS_NP: False
  
